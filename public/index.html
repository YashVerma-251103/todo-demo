<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Todo Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    input { padding: .4rem .6rem; font-size: 1rem; width: 70%; }
    button { padding: .4rem .8rem; font-size: 1rem; cursor: pointer; }
    li { display: flex; align-items: center; gap: .5rem; margin: .4rem 0; }
    li button { background: none; border: none; color: #c00; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h2>Todo Demo</h2>
  <form id="form">
    <input id="text" placeholder="New todo…" required />
    <button type="submit">Add</button>
  </form>
  <ul id="list"></ul>
  <script>
    const list = document.getElementById("list");
    const form = document.getElementById("form");
    const input = document.getElementById("text");

    async function load() {
      const res = await fetch("/todos");
      const todos = await res.json();
      list.innerHTML = "";
      todos.forEach(({ id, text }) => {
        const li = document.createElement("li");
        li.innerHTML = `<span>${text}</span><button onclick="del(${id})">✕</button>`;
        list.appendChild(li);
      });
    }

    async function del(id) {
      await fetch(`/todos/${id}`, { method: "DELETE" });
      load();
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      await fetch("/todos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: input.value }),
      });
      input.value = "";
      load();
    });

    load();
  </script>
</body>
</html>
